name: release

# Tag-triggered signed release with auto-update artifacts.
#
# Pushing a tag like `v0.1.1` builds Vibe on every target platform, signs each
# bundle with the Apple Developer ID identity (notarized + stapled) and the
# updater key, and publishes a GitHub Release containing the installers plus
# `latest.json`. Installed apps poll
# `releases/latest/download/latest.json` (see tauri.conf.json → plugins.updater)
# and auto-update to the new signed bundle.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   TAURI_SIGNING_PRIVATE_KEY           contents of the updater private key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  its password ("" if generated without one)
#   APPLE_CERTIFICATE                   base64 of the Developer ID .p12 (cert + key)
#   APPLE_CERTIFICATE_PASSWORD          password used when exporting that .p12
#   APPLE_SIGNING_IDENTITY             "Developer ID Application: … (TEAMID)"
#   APPLE_ID / APPLE_PASSWORD          Apple ID + app-specific password (notarize)
#   APPLE_TEAM_ID                      Apple Developer Team ID
# GITHUB_TOKEN is provided automatically and needs `contents: write` (below).

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # Create exactly ONE draft release up front and hand its id to every matrix
  # build job (via `releaseId`), so the builds only UPLOAD — they never race to
  # "find-or-create" the release. Without this, tauri-action's parallel matrix
  # jobs each create their own draft for the tag (GitHub allows multiple drafts
  # per tag), splitting assets across competing releases; and an external
  # process that pre-creates an empty *published* release for the tag then
  # shadows them (`gh release view <tag>` resolves to the published empty one).
  # The publish job below is the sole writer that finalizes and publishes.
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
    steps:
      - name: Create (or reuse) the draft release
        id: create
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Idempotent across re-runs: reuse an existing draft for this tag if
          # one is already present, otherwise create a fresh one. Creating a
          # draft is allowed even when an empty published release exists for the
          # tag (GitHub only forbids two *published* releases per tag).
          id=$(gh api "repos/${REPO}/releases?per_page=100" \
            --jq ".[] | select(.tag_name==\"${TAG}\" and .draft==true) | .id" | head -n1)
          if [ -n "$id" ]; then
            echo "reusing draft release $id"
          else
            id=$(gh api --method POST "repos/${REPO}/releases" \
              -f tag_name="${TAG}" -f name="Vibe ${TAG}" -F draft=true -F prerelease=false \
              --jq .id)
            echo "created draft release $id"
          fi
          echo "release_id=$id" >> "$GITHUB_OUTPUT"

  release:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          # arm64 builds the .dmg too (its DMG step works on this runner).
          - platform: macos-latest # Apple Silicon
            target: aarch64-apple-darwin
            bundles: app,dmg
          # Intel build, cross-compiled on the arm64 runner: GitHub retired the
          # macos-13 (Intel) hosted-runner pool, so that label now queues
          # forever (never assigned a runner). macos-latest (Apple Silicon)
          # cross-builds x86_64 fine — Rust targets it natively and the Python
          # sidecar's x86_64 pip/smoke-import runs under the Rosetta 2 that
          # GitHub's arm64 runners ship pre-installed. Build the .dmg too so
          # Intel users get a real installer (not the raw updater tarball); DMG
          # packaging is arch-independent file-copying, so it runs fine here.
          - platform: macos-latest # Apple Silicon, cross-compiling Intel
            target: x86_64-apple-darwin
            bundles: app,dmg
          # Windows: x64 installer. `nsis` is the auto-updater target (Tauri's
          # updater on Windows consumes the NSIS setup .exe + its .sig). The
          # sidecar scripts are now Git-Bash-portable (sha256/mirror_dir/unzip
          # fallbacks), so this runs on windows-latest.
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis
          # Linux is still omitted: the slicer/python sidecar download branches
          # there are sketched but untested. Re-add an ubuntu-22.04 entry once
          # those are exercised.

    runs-on: ${{ matrix.platform }}
    # Hard cap so a hung step fails fast instead of burning the 6h default.
    # Step-level timeouts below localize it.
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      # Derive the bundle version from the pushed tag (v0.1.12 -> 0.1.12) and
      # stamp it into tauri.conf.json + Cargo.toml + Cargo.lock, so the release
      # version always matches the tag with no hand-edited "bump version" commit.
      - name: Stamp version from tag
        shell: bash
        run: scripts/build/set-version.sh "${GITHUB_REF_NAME}"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: viewer/package-lock.json

      - name: Install viewer dependencies
        run: npm --prefix viewer ci

      # Reclaim disk on the macOS runners before the heavy build. GitHub's
      # Apple-Silicon hosted runners ship only ~14 GB free (the roomy Intel
      # macos-13 pool was retired). The notarization path tauri-action runs
      # writes a full-size (~1 GB) temp .zip copy of the .app to upload to
      # Apple, and `bundle_dmg.sh` then needs another ~1 GB for the read-write
      # disk image it builds with `hdiutil create -srcfolder Vibe.app`. On top
      # of the ~1 GB sidecars baked into the bundle and the multi-GB Rust
      # release target dir, that tips the runner into "No space left on device":
      # `hdiutil create` aborts in ~8 s and tauri reports only the opaque
      # "error running bundle_dmg.sh" (the script's own stderr is logged at
      # debug level and swallowed unless --verbose, added below). Deleting the
      # iOS/tvOS/watchOS Simulator runtimes and the non-active Xcode installs —
      # none of which a mac desktop build needs — frees 20-40 GB. The active
      # Xcode (codesign/notarytool/SetFile) is kept.
      - name: Free up disk space (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -x
          df -h /
          sudo rm -rf /Library/Developer/CoreSimulator/Profiles/Runtimes/* || true
          sudo rm -rf "${HOME}/Library/Developer/CoreSimulator/Caches/"* || true
          sudo xcrun simctl delete all 2>/dev/null || true
          active="$(xcode-select -p | sed 's:/Contents/Developer::')"
          for app in /Applications/Xcode_*.app; do
            [ "$app" = "$active" ] && continue
            sudo rm -rf "$app" || true
          done
          df -h /

      # Sidecars (~1 GB): bundled CPython + OrcaSlicer that the .app ships.
      # NOTE: the build scripts are currently exercised on macOS only; the
      # Windows/Linux download branches are sketched but untested upstream and
      # may need per-platform fixes before these jobs go green.
      - name: Build bundled sidecars
        shell: bash
        timeout-minutes: 30
        # Pass the matrix target so a cross-build (x86_64 on the arm64 runner)
        # fetches the right-arch sidecars instead of defaulting to host arch.
        run: scripts/build/build-all-sidecars.sh --target ${{ matrix.target }}

      - name: Build, sign, and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing (minisign): signs latest.json so installed apps
          # trust the update. Separate from Apple signing below.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Apple Developer ID code signing + notarization. tauri imports the
          # base64 .p12 into a temp keychain, signs the .app/.dmg with the
          # identity, then notarizes + staples via the Apple ID app-specific
          # password. Without these, downloads hit Gatekeeper's "app is damaged".
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: desktop
          # Upload into the single draft created by `create-release` instead of
          # find-or-creating one per matrix job — this is what eliminates the
          # parallel-release race. The publish job flips it to published.
          releaseId: ${{ needs.create-release.outputs.release_id }}
          includeUpdaterJson: true
          # Per-arch bundle set (see matrix). `createUpdaterArtifacts` (in
          # tauri.conf.json) still emits the signed .app.tar.gz + .sig that the
          # auto-updater needs, regardless of whether dmg is built.
          # `--verbose` raises tauri's log level to debug so the bundler echoes
          # bundle_dmg.sh's own stdout/stderr (otherwise swallowed) — essential
          # for diagnosing any future DMG packaging failure.
          args: --verbose --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

  # Finalize the single draft built above: drop any stray same-tag releases
  # (the empty *published* shadow an external process pre-creates, plus any
  # leftover drafts), rename the human-facing installers to plain-language names
  # (users can't tell "aarch64" from "x64"), rewrite the Windows updater URL in
  # latest.json, then publish. Runs AFTER every build job and operates on the
  # release BY ID (`needs.create-release.outputs.release_id`), never `gh release
  # view <tag>` — which is ambiguous when several releases share the tag.
  #
  #   Vibe_<ver>_aarch64.dmg         -> Vibe-<ver>-macOS-Apple-Silicon.dmg
  #   Vibe_<ver>_x64.dmg             -> Vibe-<ver>-macOS-Intel.dmg
  #   Vibe_<ver>_x64-setup.exe       -> Vibe-<ver>-Windows-Setup.exe    (+ .sig)
  #
  # The two macOS .app.tar.gz updater bundles are left untouched: nobody
  # downloads them by hand (Intel now ships a .dmg) and renaming them would
  # break the mac auto-updater. The Windows setup .exe IS the updater artifact,
  # so after renaming it we rewrite the windows-* URLs inside latest.json and
  # re-upload it.
  publish:
    needs: [create-release, release]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      TAG: ${{ github.ref_name }}
      REL_ID: ${{ needs.create-release.outputs.release_id }}
    steps:
      - name: Drop stray same-tag releases
        shell: bash
        run: |
          set -euo pipefail
          # GitHub forbids two *published* releases per tag, so the empty
          # published shadow must go before we can publish ours. Delete every
          # release sharing this tag except the one we built into.
          gh api "repos/${REPO}/releases?per_page=100" \
            --jq ".[] | select(.tag_name==\"${TAG}\") | .id" | while read -r id; do
              [ "$id" = "$REL_ID" ] && continue
              gh api --method DELETE "repos/${REPO}/releases/${id}" \
                && echo "deleted stray release $id" || echo "could not delete $id"
            done

      - name: Rename installers and patch latest.json
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"

          # Rename the release asset whose name ends in $1 to the exact name $2.
          # Matching by suffix keeps this version-independent and resilient to
          # Tauri's arch-token quirks (x86_64 -> "x64", aarch64 -> "aarch64").
          # Scoped to our release id, not a tag lookup.
          rename_suffix() {
            local suffix="$1" new="$2" aid
            aid=$(gh api "repos/${REPO}/releases/${REL_ID}/assets?per_page=100" \
              --jq ".[] | select(.name | endswith(\"$suffix\")) | .id" | head -n1)
            if [ -z "$aid" ]; then
              echo "skip: no asset ending in '$suffix'"
              return 0
            fi
            gh api --method PATCH "repos/${REPO}/releases/assets/${aid}" -f name="$new" >/dev/null
            echo "renamed *$suffix -> $new"
          }

          rename_suffix "_aarch64.dmg"        "Vibe-${VERSION}-macOS-Apple-Silicon.dmg"
          rename_suffix "_x64.dmg"            "Vibe-${VERSION}-macOS-Intel.dmg"
          rename_suffix "_x64-setup.exe"      "Vibe-${VERSION}-Windows-Setup.exe"
          rename_suffix "_x64-setup.exe.sig"  "Vibe-${VERSION}-Windows-Setup.exe.sig"

          # The Windows updater downloads by the URL baked into latest.json, so
          # point it at the renamed setup .exe. (macOS updater URLs are
          # unchanged — the .app.tar.gz bundles were not renamed.) Now that only
          # our release carries the tag, `gh release` by tag is unambiguous.
          mkdir -p dl
          gh release download "$TAG" -R "$REPO" -p latest.json -D dl --clobber
          NEW_WIN_URL="https://github.com/${REPO}/releases/download/${TAG}/Vibe-${VERSION}-Windows-Setup.exe"
          python3 - dl/latest.json "$NEW_WIN_URL" <<'PY'
          import json, sys
          path, new_url = sys.argv[1], sys.argv[2]
          with open(path) as f:
              data = json.load(f)
          for key in ("windows-x86_64", "windows-x86_64-nsis"):
              if key in data.get("platforms", {}):
                  data["platforms"][key]["url"] = new_url
          with open(path, "w") as f:
              json.dump(data, f, indent=2)
          PY
          gh release upload "$TAG" -R "$REPO" dl/latest.json --clobber
          echo "patched latest.json windows-* url -> $NEW_WIN_URL"

      - name: Publish the release
        shell: bash
        run: |
          set -euo pipefail
          gh api --method PATCH "repos/${REPO}/releases/${REL_ID}" \
            -F draft=false -f make_latest=true >/dev/null
          echo "published release ${REL_ID} for ${TAG}"
