name: release

# Tag-triggered release with auto-update artifacts (no Apple code signing).
#
# Pushing a tag like `v0.1.1` builds Panda on every target platform, signs the
# updater manifest with the minisign updater key, and publishes a GitHub Release
# containing the installers plus `latest.json`. Installed apps poll
# `releases/latest/download/latest.json` (see tauri.conf.json → plugins.updater)
# and auto-update to the new bundle.
#
# The bundles are NOT Apple-codesigned/notarized — macOS users clear Gatekeeper
# manually on first launch (right-click → Open). The updater signature is
# unrelated to Apple signing and is still required for auto-update to work.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   TAURI_SIGNING_PRIVATE_KEY           contents of the updater private key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  its password ("" if generated without one)
# GITHUB_TOKEN is provided automatically and needs `contents: write` (below).

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          # arm64 builds the .dmg too (its DMG step works on this runner).
          - platform: macos-latest # Apple Silicon
            target: aarch64-apple-darwin
            bundles: app,dmg
          # Intel build, cross-compiled on the arm64 runner: GitHub retired the
          # macos-13 (Intel) hosted-runner pool, so that label now queues
          # forever (never assigned a runner). macos-latest (Apple Silicon)
          # cross-builds x86_64 fine — Rust targets it natively and the Python
          # sidecar's x86_64 pip/smoke-import runs under the Rosetta 2 that
          # GitHub's arm64 runners ship pre-installed. App-only: skip the .dmg
          # Finder AppleScript; Intel users get the .app.tar.gz.
          - platform: macos-latest # Apple Silicon, cross-compiling Intel
            target: x86_64-apple-darwin
            bundles: app
          # Windows: x64 installer. `nsis` is the auto-updater target (Tauri's
          # updater on Windows consumes the NSIS setup .exe + its .sig). The
          # sidecar scripts are now Git-Bash-portable (sha256/mirror_dir/unzip
          # fallbacks), so this runs on windows-latest.
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis
          # Linux is still omitted: the slicer/python sidecar download branches
          # there are sketched but untested. Re-add an ubuntu-22.04 entry once
          # those are exercised.

    runs-on: ${{ matrix.platform }}
    # Hard cap so a hung step fails fast instead of burning the 6h default.
    # Step-level timeouts below localize it.
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: viewer/package-lock.json

      - name: Install viewer dependencies
        run: npm --prefix viewer ci

      # Sidecars (~1 GB): bundled CPython + OrcaSlicer that the .app ships.
      # NOTE: the build scripts are currently exercised on macOS only; the
      # Windows/Linux download branches are sketched but untested upstream and
      # may need per-platform fixes before these jobs go green.
      - name: Build bundled sidecars
        shell: bash
        timeout-minutes: 30
        # Pass the matrix target so a cross-build (x86_64 on the arm64 runner)
        # fetches the right-arch sidecars instead of defaulting to host arch.
        run: scripts/build/build-all-sidecars.sh --target ${{ matrix.target }}

      - name: Build, sign, and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing (minisign): signs latest.json so installed apps
          # trust the update. This is the updater's own key, NOT Apple code
          # signing — auto-update still requires it.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # NOTE: Apple Developer ID code signing + notarization is intentionally
          # disabled. The release ships unsigned; macOS users clear Gatekeeper
          # manually (right-click → Open, or `xattr -dr com.apple.quarantine`).
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: "Panda ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          # Per-arch bundle set (see matrix): arm64 builds app+dmg, Intel builds
          # app-only to dodge the DMG/Finder hang. `createUpdaterArtifacts` (in
          # tauri.conf.json) still emits the signed .app.tar.gz + .sig that the
          # auto-updater needs, regardless of whether dmg is built.
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
